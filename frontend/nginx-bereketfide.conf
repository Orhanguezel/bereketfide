# =============================================================
# nginx config — bereketfide.com.tr
# Next.js 16 standalone (port 3030) + Fastify backend (port 8086)
# =============================================================

# HTTP → HTTPS redirect (non-www + www)
server {
    listen 80;
    listen [::]:80;
    server_name bereketfide.com.tr www.bereketfide.com.tr;

    return 301 https://www.bereketfide.com.tr$request_uri;
}

# HTTPS — non-www → www canonical redirect
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bereketfide.com.tr;

    ssl_certificate     /etc/letsencrypt/live/bereketfide.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bereketfide.com.tr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.bereketfide.com.tr$request_uri;
}

# HTTPS — www (canonical)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.bereketfide.com.tr;

    ssl_certificate     /etc/letsencrypt/live/bereketfide.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bereketfide.com.tr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_vary on;

    # Legacy / non-locale Turkish URLs — keep Google on canonical locale-prefixed pages.
    location = /Default { return 301 /tr; }
    location = /default { return 301 /tr; }
    location = /neden-biz { return 301 /tr/hakkimizda; }
    location = /projeler { return 301 /tr/urunler; }
    location = /projects { return 301 /tr/urunler; }
    location = /kataloglar { return 301 /tr/kataloglar; }
    location = /hakkimizda { return 301 /tr/hakkimizda; }
    location = /galeri { return 301 /tr/galeri; }
    location = /iletisim { return 301 /tr/iletisim; }
    location = /teklif { return 301 /tr/teklif; }
    location = /urunler { return 301 /tr/urunler; }
    location = /hizmetler { return 301 /tr/hizmetler; }
    location = /blog { return 301 /tr/blog; }
    location = /haberler { return 301 /tr/haberler; }
    location = /fiyat-listesi { return 301 /tr/fiyat-listesi; }
    location = /referanslar { return 301 /tr/referanslar; }
    location = /insan-kaynaklari { return 301 /tr/insan-kaynaklari; }

    # Static assets — Next.js _next/static
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_valid  200 1y;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    # Static public assets
    location /media/ {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    # Public PDFs stay accessible, but should not appear in Google results.
    location ^~ /uploads/offers/ {
        proxy_pass         http://127.0.0.1:8086;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         X-Robots-Tag "noindex, noarchive, nosnippet" always;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    location ^~ /uploads/library/ {
        proxy_pass         http://127.0.0.1:8086;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         X-Robots-Tag "noindex, noarchive, nosnippet" always;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    location ^~ /uploads/references/ {
        proxy_pass         http://127.0.0.1:8086;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         X-Robots-Tag "noindex, noarchive, nosnippet" always;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    # Uploaded assets — backend (Fastify static)
    location /uploads/ {
        proxy_pass         http://127.0.0.1:8086;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    # API — backend (Fastify)
    location /api/ {
        proxy_pass         http://127.0.0.1:8086;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Frontend — Next.js
    location / {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering    off;
    }

    # Logs
    access_log /var/log/nginx/bereketfide.access.log;
    error_log  /var/log/nginx/bereketfide.error.log;
}
